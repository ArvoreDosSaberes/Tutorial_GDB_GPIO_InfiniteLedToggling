# Configuração OpenOCD para STM32F411RETx
# Baseado nas configurações do STM32CubeIDE

# Interface ST-Link V2/V3
source [find interface/stlink.cfg]

# Configuração do target STM32F4x
source [find target/stm32f4x.cfg]

# Configurações específicas para STM32F411RE
set CHIPNAME stm32f411re
set CPUTAPID 0x4ba00477
set WORKAREASIZE 0x10000

# Clock de 8MHz (HSE)
adapter speed 2000
adapter srst delay 100
adapter srst delay 100

# Reset configuration
reset_config srst_only srst_nogate connect_assert_srst

# Habilitar debug
gdb_target_description enable
gdb_memory_map enable
